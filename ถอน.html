<html>
<head>
  <title>ถอน</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Mali', sans-serif;
      background: linear-gradient(135deg, #fdfbfb, #ebedee);
    }

    .navbar {
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .card {
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .table th {
      background: #343a40;
      color: #fff;
    }

    .total-row {
      background: #ffeeba;
      font-weight: bold;
    }

    .header-title {
      font-weight: 700;
      color: #333;
    }
  </style>
</head>

<body>

<!-- 🔥 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    
    <a class="navbar-brand fw-bold" href="#">💼 เว็ปไซต์สรุปยอดบอทของหลินฝาน</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">

         <li class="nav-item">
          <a class="nav-link active" href="#">📊 สรุป</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="ฝาก.html">💰 ฝาก</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="ถอน.html">💸 ถอน</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="บริจาค.html">🎁 บริจาค</a>
        </li>

      </ul>
    </div>

  </div>
</nav>

<!-- 🔥 Content -->
<div class="container py-5">

  <div class="text-center mb-4">
    <h2 class="header-title">สรุปยอดถอนวันนี้ (${today})</h2>
  </div>

  <div class="card p-4">

    <div class="table-responsive">
      <table class="table table-hover table-bordered text-center align-middle">
        <thead>
          <tr>
            <th>👤 ยูสเซอร์</th>
            <th>💰 จำนวนเงิน (บาท)</th>
          </tr>
        </thead>

        <tbody>
          ${rows}
          <tr class="total-row">
            <td>รวมทั้งหมด</td>
            <td>${total}</td>
          </tr>
        </tbody>

      </table>
    </div>

  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
