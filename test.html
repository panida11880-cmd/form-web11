<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Script Sender Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://i.ibb.co/Ld52bW2v/image.png">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #ffffff;
            --sub: #94a3b8;
        }

        body.light {
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --sub: #64748b;
        }

        body {
            font-family: 'Mali', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 20px;
            transition: 0.3s;
        }

        .header-bar {
            position: sticky;
            top: 10px;
            z-index: 999;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            background: var(--card);
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        .title { display: flex; align-items: center; gap: 10px; margin: 0; }
        .logo-title { display: flex; align-items: center; gap: 8px; }
        .logo { width: 65px; height: 55px; object-fit: cover; border-radius: 6px; }

        .box {
            background: var(--card);
            padding: 15px;
            margin: 12px 0;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }

        .box:hover { transform: translateY(-3px) scale(1.01); }
        .box.selectMode { outline: 3px solid #22c55e; }

        .tag {
            background: #ff0040;
            padding: 4px 12px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 8px;
        }

        .preview { width: 100px; height: 100px; object-fit: cover; border-radius: 12px; margin-left: 10px; }

        .cat-btn {
            padding: 8px 16px;
            margin: 4px;
            border: none;
            border-radius: 9px;
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Mali', sans-serif;
            font-weight: 600;
        }

        .cat-btn.active { background: #22c55e; color: #fff; }

        #selectBtn {
            width: 44px; height: 44px; border-radius: 14px; border: none;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white; cursor: pointer; font-size: 20px;
            display: flex; align-items: center; justify-content: center;
        }

        #selectBtn.active { background: linear-gradient(135deg, #3b82f6, #2563eb); }

        /* Modal & Toast */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; justify-content: center; align-items: center; z-index: 10000;
        }
        #modal img { max-width: 90%; max-height: 90%; border-radius: 12px; cursor: pointer; }
        .toast {
            position: fixed; bottom: 20px; right: 20px; background: #22c55e;
            color: white; padding: 10px 20px; border-radius: 10px; display: none; z-index: 10001;
        }

        /* iOS Toggle */
        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #334155; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #22c55e; }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1 class="title">
            <span class="logo-title">
                <img src="https://i.ibb.co/HTdk1skX/image.png" class="logo">
                สคริปต์ของ 林凡
            </span>
        </h1>

        <div style="display: flex; gap: 10px; align-items: center;">
            <button id="selectBtn"><span>✔</span></button>
            <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div id="tabButtons"></div>
    <div id="categoryButtons" style="margin-top: 10px;"></div>
    
    <div id="app"></div>

    <div id="modal"><img id="modalImg"></div>
    <div class="toast" id="toast">คัดลอกแล้ว!</div>

    <script>
        const SHEET_ID = "1nYi6vpfM-uTC6N6XaXg-rQIpP8_QKbQLsX8a3_w7W58";
        // API สำหรับดึงรายชื่อแท็บ (ใช้ opensheet.elk.sh/SHEET_ID จะคืนค่าเป็น List ของชื่อแผ่นงาน)
        const TABS_API = `https://opensheet.elk.sh/${SHEET_ID}`;

        const app = document.getElementById("app");
        const tabArea = document.getElementById("tabButtons");
        const catArea = document.getElementById("categoryButtons");
        const modal = document.getElementById("modal");
        const modalImg = document.getElementById("modalImg");
        const themeToggle = document.getElementById("themeToggle");
        const selectBtn = document.getElementById("selectBtn");

        let allData = [];
        let selectMode = false;

        // 1. เริ่มต้นโหลดรายชื่อหน้าชีต
        async function init() {
            try {
                const response = await fetch(TABS_API);
                const tabs = await response.json();

                tabArea.innerHTML = "";
                tabs.forEach((tabName, index) => {
                    const btn = document.createElement("button");
                    btn.className = "cat-btn tab-selector";
                    btn.innerText = `📄 ${tabName}`;
                    btn.onclick = () => {
                        document.querySelectorAll(".tab-selector").forEach(b => b.classList.remove("active"));
                        btn.classList.add("active");
                        loadSheetData(tabName);
                    };
                    tabArea.appendChild(btn);
                    if (index === 0) btn.click();
                });
            } catch (err) {
                app.innerHTML = "❌ ไม่สามารถโหลดรายชื่อชีตได้ ตรวจสอบว่าเปิด Public หรือยัง";
            }
        }

        // 2. โหลดข้อมูลจากชีตที่เลือก
        async function loadSheetData(sheetName) {
            app.innerHTML = "<p style='text-align:center'>⏳ กำลังโหลดข้อมูล...</p>";
            catArea.innerHTML = "";
            try {
                const res = await fetch(`https://opensheet.elk.sh/${SHEET_ID}/${sheetName}`);
                allData = await res.json();

                const cats = [...new Set(allData.map(r => r["หมวดใหญ่"]).filter(Boolean))];
                cats.forEach(cat => {
                    const btn = document.createElement("button");
                    btn.className = "cat-btn";
                    btn.innerText = cat;
                    btn.onclick = () => {
                        catArea.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
                        btn.classList.add("active");
                        render(cat);
                    };
                    catArea.appendChild(btn);
                });

                if (cats.length > 0) catArea.querySelector(".cat-btn").click();
                else render(null);
            } catch (err) {
                app.innerHTML = "❌ เกิดข้อผิดพลาดในการดึงข้อมูล";
            }
        }

        // 3. แสดงผลรายการ
        function render(selectedCat) {
            app.innerHTML = "";
            const filtered = selectedCat ? allData.filter(r => r["หมวดใหญ่"] === selectedCat) : allData;

            filtered.forEach(row => {
                const title = row["หัวข้อ"] || "ไม่มีหัวข้อ";
                const text = row["ข้อความ"] || "";
                const img = row["รูป"] || "";

                const box = document.createElement("div");
                box.className = "box";
                box.innerHTML = `
                    <div class="text">
                        <div class="tag">${title}</div>
                        <div style="white-space: pre-wrap;">${text}</div>
                    </div>
                    ${img ? `<img src="${img}" class="preview">` : ""}
                `;

                box.onclick = () => {
                    if (selectMode) {
                        box.classList.toggle("selectMode");
                    } else {
                        copyText(text);
                    }
                };

                if (img) {
                    box.querySelector(".preview").onclick = (e) => {
                        e.stopPropagation();
                        openImage(img);
                    };
                }
                app.appendChild(box);
            });
        }

        // --- ระบบเสริม ---
        function copyText(text) {
            if (!text) return;
            navigator.clipboard.writeText(text);
            showToast("คัดลอกข้อความแล้ว!");
        }

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.style.display = "block";
            setTimeout(() => t.style.display = "none", 1500);
        }

        function openImage(url) {
            modalImg.src = url;
            modal.style.display = "flex";
        }

        modal.onclick = () => modal.style.display = "none";

        themeToggle.onchange = () => {
            document.body.classList.toggle("light", themeToggle.checked);
        };

        selectBtn.onclick = () => {
            selectMode = !selectMode;
            selectBtn.classList.toggle("active", selectMode);
            if (!selectMode) {
                document.querySelectorAll(".box").forEach(b => b.classList.remove("selectMode"));
            }
        };

        // เริ่มรัน
        init();
    </script>
</body>
</html>
