<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ลงทะเบียนรับ BodyKey</title>

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Prompt',sans-serif;
}

body{
margin:0;
background:linear-gradient(180deg,#eaf5ee,#dbe8e0);
display:flex;
justify-content:center;
padding:20px;
}

.app{

width:100%;
max-width:420px;

}

.card{

background:white;
border-radius:16px;
padding:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);

}

/* step */

.step{

display:flex;
justify-content:center;
margin-bottom:25px;
gap:10px;

}

.circle{

width:34px;
height:34px;
border-radius:50%;
background:#d9d9d9;
display:flex;
align-items:center;
justify-content:center;
font-weight:500;

}

.circle.active{

background:#2e8b57;
color:white;

}

.line{

width:40px;
height:3px;
background:#ddd;
margin-top:15px;

}

/* form */

label{

font-size:14px;
font-weight:500;

}

input,select{

width:100%;
padding:12px;
margin-top:6px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:15px;

}

input:focus{

outline:none;
border:1px solid #2e8b57;

}

.radio{

display:grid;
grid-template-columns:1fr 1fr;
gap:8px;

}

.radio label{

background:#f4f6f5;
padding:10px;
border-radius:8px;
display:flex;
align-items:center;
gap:6px;
cursor:pointer;

}

/* button */

button{

width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#2e8b57;
color:white;
font-size:16px;
margin-top:10px;

}

/* popup */

.popup{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;

}

.popup-card{

background:white;
padding:20px;
border-radius:14px;
width:90%;
max-width:350px;

}

/* success */

.success{

position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:16px;
display:none;
text-align:center;

}

.check{

font-size:60px;
color:#2e8b57;

}

</style>
</head>

<body>

<div class="app">

<div class="card">

<div class="step">

<div id="s1" class="circle active">1</div>
<div class="line"></div>
<div id="s2" class="circle">2</div>

</div>

<form id="form">

<!-- STEP1 -->

<div id="step1">

<h3>เลือกรสชาติสินค้า</h3>

<div class="radio">

<label><input type="radio" name="flavor1" value="เบอร์รี่">เบอร์รี่</label>
<label><input type="radio" name="flavor1" value="กาแฟ">กาแฟ</label>
<label><input type="radio" name="flavor1" value="โกโก้">โกโก้</label>
<label><input type="radio" name="flavor1" value="ชาไทย">ชาไทย</label>

</div>

<h4>กล่องที่ 2</h4>

<div class="radio">

<label><input type="radio" name="flavor2" value="เบอร์รี่">เบอร์รี่</label>
<label><input type="radio" name="flavor2" value="กาแฟ">กาแฟ</label>
<label><input type="radio" name="flavor2" value="โกโก้">โกโก้</label>
<label><input type="radio" name="flavor2" value="ชาไทย">ชาไทย</label>

</div>

</div>

<!-- STEP2 -->

<div id="step2" style="display:none">

<h3>ข้อมูลผู้รับสิทธิ์</h3>

<label>ชื่อ</label>
<input name="firstname" required pattern="[ก-๙a-zA-Z\s]+" oninput="this.value=this.value.replace(/[^ก-๙a-zA-Z\s]/g,'')">

<label>นามสกุล</label>
<input name="lastname" required pattern="[ก-๙a-zA-Z\s]+" oninput="this.value=this.value.replace(/[^ก-๙a-zA-Z\s]/g,'')">

<label>ชื่อเล่น</label>
<input name="nickname" pattern="[ก-๙a-zA-Z\s]+" oninput="this.value=this.value.replace(/[^ก-๙a-zA-Z\s]/g,'')">

<label>อายุ</label>
<input name="age" type="number" min="1" max="120" required>

<label>เบอร์โทร</label>
<input name="phone"
pattern="[0-9]{10}"
maxlength="10"
required
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<label>เลขที่บ้าน</label>
<input name="house" required
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<label>หมู่ที่</label>
<input name="village"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<label>ตำบล</label>
<input name="subdistrict" required>

<label>อำเภอ</label>
<input name="district" required>

<label>จังหวัด</label>
<input name="province" required>

<button type="button" onclick="preview()">ยืนยันการใช้สิทธิ์</button>

</div>

</form>

</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-card">

<h3>ตรวจสอบข้อมูล</h3>

<div id="preview"></div>

<button onclick="send()">ยืนยันข้อมูล</button>

</div>

</div>

<!-- SUCCESS -->

<div class="success" id="success">

<div class="check">✔</div>

<p>ส่งคำขอลงทะเบียนใช้สิทธิ์รับสินค้าฟรีเรียบร้อย</p>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbxWPoWY7XAYsqT9unH0fGo4b13TMNWDApsmbijWzM6pUii7Vyj9yui9G-284Oj1qLGH/exec";

const radios=document.querySelectorAll("input[type=radio]")

radios.forEach(r=>{

r.addEventListener("change",()=>{

const f1=document.querySelector("input[name=flavor1]:checked")
const f2=document.querySelector("input[name=flavor2]:checked")

if(f1 && f2){

document.getElementById("step1").style.display="none"
document.getElementById("step2").style.display="block"

document.getElementById("s1").classList.remove("active")
document.getElementById("s2").classList.add("active")

}

})

})

function preview(){

const data=new FormData(document.getElementById("form"))

let html=""

for(let [k,v] of data){

html+=k+" : "+v+"<br>"

}

document.getElementById("preview").innerHTML=html
document.getElementById("popup").style.display="flex"

}

function send(){

const form=document.getElementById("form")

document.getElementById("popup").style.display="none"
document.getElementById("success").style.display="block"

fetch(scriptURL,{
method:"POST",
body:new FormData(form)
})

setTimeout(()=>{

document.getElementById("success").style.display="none"
form.reset()

},2500)

}

</script>

</body>
</html>
