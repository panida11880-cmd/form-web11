<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลงทะเบียนรับ BodyKey</title>

<style>

body{
font-family: Arial;
background:#d9e6d7;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

h1{
margin:0;
}

label{
display:block;
margin-top:10px;
}

input[type=text],input[type=number]{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
margin-top:5px;
}

.radio-group{
margin-top:10px;
}

button{
background:#0f9d58;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0b7d45;
}

img{
width:100%;
border-radius:8px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<h1>ลงทะเบียนเข้ารับ BodyKey by NUTRILITE ฟรี</h1>
<p>ชุดทดลองฟรี 2 กล่อง ทานได้ 1 เดือน</p>
</div>

<form id="form">

<div class="card">

<label>รสชาติที่ต้องการทดลอง กล่องที่ 1 *</label>

<img src="https://i.imgur.com/Q7b6KpA.png">

<div class="radio-group">
<label><input type="radio" name="flavor1" value="เบอร์รี่"> รสเบอร์รี่</label>
<label><input type="radio" name="flavor1" value="กาแฟ"> รสกาแฟ</label>
<label><input type="radio" name="flavor1" value="โกโก้"> รสโกโก้</label>
<label><input type="radio" name="flavor1" value="ชาไทย"> รสชาไทย</label>
<label><input type="radio" name="flavor1" value="กล้วย"> รสกล้วย</label>
</div>

</div>

<div class="card">

<label>รสชาติที่ต้องการทดลอง กล่องที่ 2 *</label>

<div class="radio-group">
<label><input type="radio" name="flavor2" value="เบอร์รี่"> รสเบอร์รี่</label>
<label><input type="radio" name="flavor2" value="กาแฟ"> รสกาแฟ</label>
<label><input type="radio" name="flavor2" value="โกโก้"> รสโกโก้</label>
<label><input type="radio" name="flavor2" value="ชาไทย"> รสชาไทย</label>
<label><input type="radio" name="flavor2" value="กล้วย"> รสกล้วย</label>
</div>

</div>

<div class="card">

<label>ชื่อ - นามสกุล *</label>
<input type="text" name="name" required>

<label>อายุ *</label>
<input type="number" name="age" required>

<label>เบอร์โทร *</label>
<input type="text" name="phone" required>

<label>ที่อยู่จัดส่ง *</label>
<input type="text" name="address" required>

</div>

<div class="card">
<button type="submit">ส่ง</button>
</div>

</form>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbxorfNTa34RUTYqD_nt6QpgagQPOo8Z3G9kS6GasfhiKpaiA_fWxNj9MZxyh-xBZTTb/exec";

document.getElementById("form").addEventListener("submit",e=>{

e.preventDefault()

fetch(scriptURL,{
method:"POST",
body:new FormData(e.target)
})
.then(()=>{

alert("ส่งข้อมูลเรียบร้อยแล้ว")
document.getElementById("form").reset()

})
.catch(()=>{

alert("เกิดข้อผิดพลาด")

})

})

</script>

</body>
</html>
