<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:sans-serif;
background:#f2f4f7;
padding:20px;
}

.card{
background:white;
border-radius:12px;
padding:15px;
margin-bottom:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<h2>📊 สรุปการลงทะเบียน</h2>

<div id="list"></div>

<script>

const API = "ใส่ลิงก์ Apps Script";

fetch(API)
.then(r=>r.json())
.then(data=>{

let html="";

data.reverse().forEach(d=>{

html += `
<div class="card">
⏰ ${d.time}<br>
👤 ${d.firstname} ${d.lastname}<br>
📞 ${d.phone}<br>
📦 ${d.product}
</div>
`;

});

document.getElementById("list").innerHTML=html;

});

</script>

</body>
</html>
